<!DOCTYPE html>
<html lang="de">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3036128934622320" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" sizes="1280x1280" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>s7 hub | The Perfect Circle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f5f5f0; --card-bg: #ffffff; --text: #2c2c2e; --accent: #d4a373; --border: #e0e0d5; --success: #2a9d8f; --error: #e63946; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg); color: var(--text); font-family: 'Georgia', serif; display: flex; flex-direction: column; user-select: none; touch-action: none; }
        .header { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 20px; }
        .header img { height: 60px; margin-bottom: 20px; cursor: pointer; }
        .header h1 { font-size: 3.5rem; font-weight: 400; margin: 0; letter-spacing: -1px; text-align: center; }
        .main-content { width: 100%; max-width: 700px; margin: 0 auto; padding: 60px 20px 0 20px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; position: relative; }
        #game-container { width: 100%; max-width: 500px; height: 500px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; cursor: crosshair; }
        #canvas { width: 100%; height: 100%; display: block; }
        #center-point { position: absolute; width: 10px; height: 10px; background-color: var(--text); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        .result-display { margin-top: 20px; font-family: sans-serif; text-align: center; min-height: 100px; width: 100%; }
        .score-value { font-size: 42px; font-weight: 900; color: var(--accent); }
        .highscore-text { font-size: 18px; color: var(--success); font-weight: bold; margin-top: 5px; display: none; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 10px 0 15px 0; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .made-by { font-family: sans-serif; font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
        .social-links { width: 100%; max-width: 550px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: var(--text); text-decoration: underline; font-family: sans-serif; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .legal-links { font-size: 12px; opacity: 0.5; margin-top: 20px; font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="header"><a href="https://johanness7.github.io/"><img src="logo.png" alt="s7 hub logo"></a><h1>The Perfect Circle</h1></div>
        <div id="game-container"><div id="center-point"></div><canvas id="canvas"></canvas></div>
        <div class="result-display">
            <div id="live-area" class="score-value"><span id="score-percent">0.0</span>%</div>
            <div id="highscore-msg" class="highscore-text">NEUER HIGHSCORE! 🏆</div>
            <div id="msg" style="font-family: sans-serif; margin-top: 10px; opacity: 0.6;">Zeichne einen Kreis um den Punkt.</div>
        </div>
    </div>
    <div class="footer-fixed">
        <div class="made-by">made by johannes_s7</div>
        <div class="social-links">
            <a href="https://www.tiktok.com/@johannas.s7" target="_blank"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            <a href="https://www.instagram.com/johannessiebecke" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
        </div>
        <div class="legal-links"><a href="privacy.html" style="color:inherit; text-decoration:none;">Privacy & Policy</a></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), container = document.getElementById('game-container');
        const scorePercent = document.getElementById('score-percent'), highscoreMsg = document.getElementById('highscore-msg');
        let isDrawing = false, points = [], centerX, centerY, currentScore = 0;

        function resizeCanvas() {
            canvas.width = container.offsetWidth; canvas.height = container.offsetHeight;
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#d4a373';
            centerX = canvas.width / 2; centerY = canvas.height / 2;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function getXY(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true; points = []; highscoreMsg.style.display = "none";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const pos = getXY(e); points.push(pos);
            ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getXY(e); points.push(pos);
            ctx.lineTo(pos.x, pos.y); ctx.stroke();
            if (points.length > 10) calculateLiveScore();
        }

        function calculateLiveScore() {
            let idealRadius = 0, totalDev = 0;
            points.forEach(p => { idealRadius += Math.sqrt((p.x - centerX)**2 + (p.y - centerY)**2); });
            idealRadius /= points.length;
            points.forEach(p => { totalDev += Math.abs(Math.sqrt((p.x - centerX)**2 + (p.y - centerY)**2) - idealRadius); });
            let score = 100 - ((totalDev / points.length) / (idealRadius * 0.5) * 100);
            currentScore = Math.max(0, Math.min(100, score)).toFixed(1);
            scorePercent.innerText = currentScore;
        }

        function finishDrawing() {
            if (!isDrawing) return;
            isDrawing = false; ctx.closePath();
            if (points.length > 50) {
                let lastHighscore = localStorage.getItem('circleHighscore') || 0;
                if (parseFloat(currentScore) > parseFloat(lastHighscore)) {
                    localStorage.setItem('circleHighscore', currentScore);
                    highscoreMsg.style.display = "block";
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            }
        }

        canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw); window.addEventListener('mouseup', finishDrawing);
        canvas.addEventListener('touchstart', startDrawing); canvas.addEventListener('touchmove', draw); window.addEventListener('touchend', finishDrawing);
    </script>
</body>
</html>
